# 커버리지 회귀 케이스 — Phase 4 (SPEC §9 Phase 4 · §12).
#
# "이게 오늘 이 분야의 메인 사건인가" 축의 부재로 놓친 사건을 고정한다.
# 케이스는 카테고리별로 분산 — 회귀는 특정 진영/소스 현상이 아니라 축의 부재다.
#
# 두 종류 (작업 1.5 분리):
#   type: pipeline     — 스냅샷(data/raw/{stage}/*)이 있는 날짜에 한해 collect→…→select 재실행하고
#                        어느 단계에서 탈락했는지(PASS/FAIL) 판정. 07-16 이후 사건만 가능.
#     필드: replay_date / must_contain_any / expect_category / expect_in_output
#   type: reachability — "우리 소스 목록이 이 사건에 도달 가능한가"를 config 기준으로 판정.
#                        스냅샷·랭킹 불필요. 07-16 이전 사건도 지금 물을 수 있다.
#     필드: date / expect_source_any / (origin_url) → REACH_OK / REACH_FAIL / NOT_CONFIGURED
#
# scripts/replay.py 가 두 type 을 각각 처리한다. SKIP 은 "창 밖"이 아니라
# "type 에 맞는 검증 수단 없음"(예: pipeline 인데 그 날짜 스냅샷/실행이 없음)일 때만.

cases:
  - id: deepseek-v4
    type: pipeline
    replay_date: 2026-06-27
    must_contain_any: ["DeepSeek-V4"]
    expect_category: llm-foundation-model
    expect_in_output: true
    note: |
      kimi-k3 pipeline 은퇴 대체(실존 모델). 실제 HF 에 "Kimi K3" 는 없다(최신 Kimi-K2.7) → 가상
      시나리오라 pipeline PASS 원리적 불가 → 실존 DeepSeek-V4-Pro/Flash-DSpark(레인 9, likes 488/200)로 교체.
      검증: replay.py 2026-06-27 --since 2026-06-25 --rank (수집창을 사건일로 맞춤). collect 도달은 작업 2
      실측에서 확인됨(레인 9 화이트리스트+임계치 통과). 전 파이프라인 PASS 는 작업 7 랭킹 런에서.

  - id: kimi-k3-reach
    type: reachability
    date: 2026-07-16
    expect_source_any: ["huggingface.co/api/models", "moonshot 공식 블로그"]
    note: "레인 0(HF trending)이 붙으면 통과해야 한다. 작업 2 검증용."

  - id: icml-2026-awards
    type: reachability
    date: 2026-07-05
    origin_url: "https://blog.icml.cc/2026/07/05/announcing-the-icml-2026-awards/"
    expect_source_any: ["blog.icml.cc"]
    note: |
      07-16 스냅샷 시작 이전 사건 → pipeline replay 불가, reachability 로만 검증.
      레퍼런스조차 원 소스를 못 잡고 2차 매체 3건(aifront/faq.com.tw/medium)으로 채웠다.
      → 웹서치는 2차 매체를 데려온다. 원 소스는 피드가 잡아야 한다. (작업 6 설계 근거)

  - id: google-tabfm
    type: reachability
    date: 2026-06-30
    expect_source_any: ["research.google"]
    note: "Phase 0에서 레인 1 FOUND. 회귀 방지용."

  - id: aws-fde-1b
    type: reachability
    date: 2026-06-30
    expect_source_any: ["aws.amazon.com"]
    note: |
      원 소스로 교정(작업 2 가드 3). AWS가 $1B FDE 조직을 발표했으면 원 소스는
      aws.amazon.com/blogs 다. CNBC·CIO Dive 는 tier 4 받아쓰기 → 추가 안 함(SPEC 원칙 7,
      레인 6 미디어는 base 중앙 2.25로 정당 탈락). 레인 1에 AWS ML 블로그 추가로 REACH_OK.
