  # Semafor: 제외 확정 — 테크 전용 피드 없음. 전 사이트 rss.xml 은 레인6을 비테크 뉴스로 오염.

# ---- 레인 2 & 4: arXiv (SPEC §3.3 / §3.5) ----
# 역할 분리: HF Daily Papers 는 LLM 편향이 커 DL / LLM·FM 를 담당하고,
# arXiv raw 는 HF 가 안 다루는 니치(tabular/causal/timeseries/...)만 전담한다.
# arXiv raw 는 아래 keyword_groups 에 매칭되는 논문만 통과 → firehose 억제.
arxiv:
  categories: [cs.LG, stat.ML, cs.AI, econ.EM, stat.ME]   # econ.EM/stat.ME = 인과
  max_total: 3000        # 수집 창 페이징 상한 (안전장치)
  keyword_groups:
    # causal: bare "causal" 제거 — causal attention/mask/LM/decoder(LLM 논문) 대량 오탐 방지.
    causal:
      - causal inference
      - causal effect
      - causal discovery
      - causal graph
      - counterfactual
      - treatment effect
      - ATE
      - CATE
      - HTE
      - uplift
      - confounder
      - confounding
      - instrumental variable
      - propensity score
      - difference-in-differences
      - DiD
      - double machine learning
      - DML
      - do-calculus
      - backdoor adjustment
      - frontdoor
      - mediation analysis
      - structural causal model
      - SCM
      - potential outcome
    tabular:
      - tabular
      - gradient boosting
      - GBDT
      - decision tree ensemble
      - LightGBM
      - XGBoost
      - CatBoost
      - random forest
      - TabPFN
      - tabular foundation model
    xai:
      - SHAP
      - interpretab
      - explainab
      - feature attribution
      - feature selection
    # timeseries: bare "temporal" 제거 — temporal graph/video 논문 대량 오탐 방지.
    timeseries:
      - time series
      - time-series
      - forecasting
      - seasonality
      - exogenous
      - ARIMA
      - SARIMA
      - N-BEATS
      - PatchTST
      - Informer
      - Autoformer
      - temporal fusion transformer
      - TFT
      - Chronos
      - TimesFM
      - Moirai
      - Lag-Llama
      - TimeGPT
    anomaly:
      - anomaly detection
      - outlier detection
      - novelty detection
    # imbalanced: bare "calibration" 제거 — LLM uncertainty calibration 논문 대량 오탐 방지.
    imbalanced:
      - class imbalance
      - imbalanced
      - long-tail
      - long-tailed
      - focal loss
      - minority class
      - resampling
      - SMOTE
      - probability calibration
      - Platt scaling
      - isotonic regression
      - beta calibration
    clustering:
      - clustering
      - representation learning for tabular

# ---- 레인 2 확장: 학회 공식 채널 (SPEC §3.3) ----
# arXiv comment 파싱은 "수락 논문"만 잡고 학회 자체 이벤트(수상작·제출 통계·키노트)는 구조적으로 못 잡는다.
# (실측: 2026-07-16 raw 의 "ICML 2026" 9건 전부 venue 태그, 어워드 발표는 0건.)
# lane=2·weight 0.85·tier 1 그대로, content_type 만 news 로 오버라이드(논문이 아니라 발표문).
# KDD 공식 블로그: RSS 미제공(kdd.org/feed 404) → 제외.
lane2_official_feeds:
  - { name: "ICML Blog",    url: "https://blog.icml.cc/feed/",    content_type: news }
  - { name: "NeurIPS Blog", url: "https://blog.neurips.cc/feed/", content_type: news }
  - { name: "ICLR Blog",    url: "https://blog.iclr.cc/feed/",    content_type: news }

# ---- 레인 9: 모델 릴리스 (SPEC §3.9.1) — HuggingFace Hub, org 화이트리스트 + 임계치로 firehose 억제 ----
# 목표 물량 일 0~5건. 초과 시 필터(임계치/제외패턴)가 느슨한 것 → 튜닝 대상.
lane9_hf:
  endpoint: "https://huggingface.co/api/models"   # 결정적 경로 (레인 1 블로그에 비의존)
  orgs: [moonshotai, deepseek-ai, Qwen, google, google-research, meta-llama,
         microsoft, openai, mistralai, amazon, Salesforce, ibm-granite,
         PriorLabs, Datadog, nvidia, apple]
  per_org_limit: 50          # createdAt desc 상위 N → 3일 창으로 다시 필터
  min_likes: 20              # likes OR downloads 하한 (둘 중 하나만 넘으면 통과)
  min_downloads: 1000
  # 파생(파인튜닝/양자화/포맷 변환/draft) 이름 패턴 — 원 릴리스만 남긴다.
  # 실측(2026-07-18): nvidia 가 타 랩 모델을 NVFP4/BF16 으로 재포장, deepseek 가 draft(block7)를
  # 대량 업로드 → 아래 포맷·precision·draft 마커로 컷. (SPEC §3.9.1 실측 기록)
  exclude_name_patterns: [gguf, awq, gptq, bnb-4bit, "-4bit", "-8bit", int4, int8,
                          "-mlx", "-onnx", exl2, "-quantized",
                          nvfp4, fp4, fp8, "-bf16", "-fp16", dflash, block7, "-ttt"]

