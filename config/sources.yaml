  - { name: "IEEE Spectrum",            url: "https://spectrum.ieee.org/feeds/topic/artificial-intelligence.rss" }
  - { name: "TechCrunch AI",            url: "https://techcrunch.com/category/artificial-intelligence/feed/" }
  - { name: "VentureBeat AI",           url: "https://venturebeat.com/category/ai/feed/" }
  - { name: "Ars Technica",             url: "https://feeds.arstechnica.com/arstechnica/index" }
  - { name: "Wired AI",                 url: "https://www.wired.com/feed/tag/ai/latest/rss" }
  # Semafor: 제외 확정 — 테크 전용 피드 없음. 전 사이트 rss.xml 은 레인6을 비테크 뉴스로 오염.

# ---- 레인 2 & 4: arXiv (SPEC §3.3 / §3.5) ----
# 역할 분리: HF Daily Papers 는 LLM 편향이 커 DL / LLM·FM 를 담당하고,
# arXiv raw 는 HF 가 안 다루는 니치(tabular/causal/timeseries/...)만 전담한다.
# arXiv raw 는 아래 keyword_groups 에 매칭되는 논문만 통과 → firehose 억제.
arxiv:
  categories: [cs.LG, stat.ML, cs.AI, econ.EM, stat.ME]   # econ.EM/stat.ME = 인과
  max_total: 3000        # 수집 창 페이징 상한 (안전장치)
  keyword_groups:
    # causal: bare "causal" 제거 — causal attention/mask/LM/decoder(LLM 논문) 대량 오탐 방지.
    causal:
      - causal inference
      - causal effect
      - causal discovery
      - causal graph
      - counterfactual
      - treatment effect
      - ATE
      - CATE
      - HTE
      - uplift
      - confounder
      - confounding
      - instrumental variable
      - propensity score
      - difference-in-differences
      - DiD
      - double machine learning
      - DML
      - do-calculus
      - backdoor adjustment
      - frontdoor
      - mediation analysis
      - structural causal model
      - SCM
      - potential outcome
    tabular:
      - tabular
      - gradient boosting
      - GBDT
      - decision tree ensemble
      - LightGBM
      - XGBoost
      - CatBoost
      - random forest
      - TabPFN
      - tabular foundation model
    xai:
      - SHAP
      - interpretab
      - explainab
      - feature attribution
      - feature selection
    # timeseries: bare "temporal" 제거 — temporal graph/video 논문 대량 오탐 방지.
    timeseries:
      - time series
      - time-series
      - forecasting
      - seasonality
      - exogenous
      - ARIMA
      - SARIMA
      - N-BEATS
      - PatchTST
      - Informer
      - Autoformer
      - temporal fusion transformer
      - TFT
      - Chronos
      - TimesFM
      - Moirai
      - Lag-Llama
      - TimeGPT
    anomaly:
      - anomaly detection
      - outlier detection
      - novelty detection
    # imbalanced: bare "calibration" 제거 — LLM uncertainty calibration 논문 대량 오탐 방지.
    imbalanced:
      - class imbalance
      - imbalanced
      - long-tail
      - long-tailed
      - focal loss
      - minority class
      - resampling
      - SMOTE
      - probability calibration
      - Platt scaling
      - isotonic regression
      - beta calibration
    clustering:
      - clustering
      - representation learning for tabular

