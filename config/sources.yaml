# 수집 소스 — SPEC §3.
# lane_weight(관심도) / source_tier(원본성) 는 두 독립 축 (SPEC 원칙 8).
# lane_weight 값은 Phase 0 실측 후 튜닝 대상 (SPEC §3.1, §10) — 임의 변경 금지.
#
# 일부 빅테크/미디어 RSS URL 은 미확정(SPEC §10). 실행 시 피드별 진단(ok/empty/error)이
# 죽은 피드를 드러낸다 — 그게 Phase 0 의 일이다.

# ---- 레인 메타 (SPEC §3.1 표) ----
lanes:
  1: { name: "빅테크 리서치 블로그", lane_weight: 1.0,  source_tier: 1, content_type: blog,    method: rss }
  2: { name: "학회 논문",           lane_weight: 0.85, source_tier: 1, content_type: paper,   method: arxiv }
  3: { name: "큐레이션 뉴스레터",   lane_weight: 0.8,  source_tier: 2, content_type: news,    method: rss }
  4: { name: "arXiv 일반",          lane_weight: 0.7,  source_tier: 1, content_type: paper,   method: arxiv }
  5: { name: "실무 블로그",         lane_weight: 0.6,  source_tier: 3, content_type: blog,    method: rss }
  6: { name: "AI 미디어",           lane_weight: 0.55, source_tier: 4, content_type: news,    method: rss }
  7: { name: "GitHub Releases",     lane_weight: 0.4,  source_tier: 1, content_type: release, method: github }
  8: { name: "국문 보조",           lane_weight: 0.6,  source_tier: 1, content_type: blog,    method: rss }

# ---- 레인 1: 빅테크 리서치 블로그 (SPEC §3.2) ----
lane1_feeds:
  - { name: "Google Research Blog",     url: "https://research.google/blog/rss/" }
  - { name: "Google DeepMind Blog",     url: "https://deepmind.google/blog/rss.xml" }
  # Meta AI(ai.meta.com/blog/rss)는 404. engineering.fb.com 이 유일한 살아있는 Meta 피드.
  - { name: "Meta Engineering",         url: "https://engineering.fb.com/feed/" }
  - { name: "Microsoft Research Blog",  url: "https://www.microsoft.com/en-us/research/feed/" }
  - { name: "Amazon Science Blog",      url: "https://www.amazon.science/index.rss" }
  - { name: "Apple ML Research",        url: "https://machinelearning.apple.com/rss.xml" }
  - { name: "NVIDIA Developer Blog",    url: "https://developer.nvidia.com/blog/feed" }
  - { name: "OpenAI News",              url: "https://openai.com/news/rss.xml" }
  # Anthropic: 공식 RSS 미제공(전 경로 404) → HTML 스크래퍼로 별도 수집(collectors/anthropic_news.py)
  # applied_engineering (tabular 실무 사례)
  - { name: "Netflix Tech Blog",        url: "https://netflixtechblog.com/feed" }
  - { name: "Airbnb Engineering",       url: "https://medium.com/feed/airbnb-engineering" }
  - { name: "Spotify Engineering",      url: "https://engineering.atspotify.com/feed/" }
  # 복구불가 — 제거:
  #   Uber Engineering    : eng 블로그 RSS 폐지 (uber.com 406 봇차단, eng.uber.com 404)
  #   LinkedIn Engineering: RSS 폐지 (전 경로 404)
  #   DoorDash Engineering: 403 Cloudflare, Medium 핸들도 빈 피드

